<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA-entral | Enterprise Solutions Architects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0F0D;
      --bg-card: rgba(16, 24, 20, 0.7);
      --bg-card-hover: rgba(20, 32, 26, 0.85);
      --border: rgba(0, 200, 83, 0.12);
      --border-hover: rgba(0, 200, 83, 0.3);
      --green: #00C853;
      --green-dim: rgba(0, 200, 83, 0.6);
      --green-bg: rgba(0, 200, 83, 0.08);
      --green-bg2: rgba(0, 200, 83, 0.15);
      --white: #F0F0F0;
      --white-dim: rgba(240, 240, 240, 0.7);
      --white-muted: rgba(240, 240, 240, 0.4);
      --coral: #FF6B6B;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: 72px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        linear-gradient(rgba(0, 200, 83, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 200, 83, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      background-attachment: fixed;
      color: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
    .label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--green); margin-bottom: 16px;
    }
    .heading {
      font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900;
      line-height: 1.05; text-transform: uppercase;
      letter-spacing: -0.02em; margin-bottom: 20px;
    }
    .heading em { font-style: italic; color: var(--green); }
    .subtext {
      font-size: 0.95rem; color: var(--white-dim);
      max-width: 620px; line-height: 1.7;
    }
    hr { border: none; height: 1px; background: var(--border); margin: 0; }

    .reveal {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .d1 { transition-delay: 0.08s; }
    .d2 { transition-delay: 0.16s; }
    .d3 { transition-delay: 0.24s; }
    .d4 { transition-delay: 0.32s; }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(11, 15, 13, 0.8);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1140px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 0.95rem; }
    .nav-brand .badge {
      background: var(--green); color: var(--bg);
      padding: 2px 8px; border-radius: 4px;
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em;
    }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { font-size: 0.8rem; font-weight: 600; color: var(--white-muted); transition: color 0.2s; }
    .nav-links a:hover { color: var(--white); }
    .nav-cta {
      background: var(--green) !important; color: var(--bg) !important;
      padding: 7px 16px !important; border-radius: 6px !important;
      font-weight: 700 !important; font-size: 0.75rem !important;
    }
    .nav-cta:hover { opacity: 0.85 !important; }
    .nav-edit { display: none; font-size: 0.75rem; font-weight: 600; color: var(--green); background: transparent; border: 1px solid var(--green); border-radius: 20px; padding: 5px 14px; cursor: pointer; transition: background 0.2s, color 0.2s; white-space: nowrap; }
    .nav-edit:hover { background: var(--green); color: #000; }
    .nav-edit.visible { display: inline-flex; align-items: center; gap: 6px; }
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
    .nav-toggle span { display: block; width: 20px; height: 2px; background: var(--white); margin: 4px 0; }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column; position: absolute;
        top: 60px; left: 0; right: 0; background: var(--bg);
        padding: 20px 24px; border-bottom: 1px solid var(--border); gap: 16px;
      }
      .nav-toggle { display: block; }
    }

    /* Hero */
    .hero { min-height: 100vh; display: flex; align-items: center; padding: 120px 0 80px; position: relative; }
    .hero::after {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 400px;
      background: radial-gradient(ellipse at 50% 100%, rgba(0, 200, 83, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-content { max-width: 700px; }
    .hero-applying {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--green);
      background: var(--green-bg); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 100px; margin-bottom: 32px;
    }
    .hero h1 {
      font-size: clamp(3rem, 7vw, 5.5rem); font-weight: 900;
      line-height: 0.95; text-transform: uppercase; letter-spacing: -0.03em; margin-bottom: 24px;
    }
    .hero h1 em { display: block; color: var(--green); font-style: italic; }
    .hero-role { font-size: 1rem; font-weight: 600; color: var(--white-dim); margin-bottom: 20px; }
    .hero-role strong { color: var(--white); }
    .hero-desc { font-size: 0.95rem; color: var(--white-muted); line-height: 1.8; max-width: 580px; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
      border: 1px solid var(--border); transition: all 0.2s; cursor: pointer;
    }
    .btn-primary { background: var(--green); color: var(--bg); border-color: var(--green); }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: transparent; color: var(--white); }
    .btn-ghost:hover { border-color: var(--border-hover); background: var(--green-bg); }
    .scroll-hint {
      text-align: center; margin-top: 60px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--white-muted);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: fadeIn 1s 1.2s ease both;
    }
    .scroll-hint::after {
      content: '';
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--green), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(0.6) translateY(0); }
      50% { opacity: 1; transform: scaleY(1) translateY(8px); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Stats */
    .stats-bar { padding: 48px 0; }
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px 20px;
    }
    .stat-num { font-size: 1.8rem; font-weight: 900; color: var(--green); line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 0.7rem; color: var(--white-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

    .section { padding: 80px 0; }

    /* Value */
    .value-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 40px; }
    .value-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px 22px;
      transition: border-color 0.3s, transform 0.3s, background 0.3s;
    }
    .value-card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); transform: translateY(-3px); }
    .value-card-icon { font-size: 1.6rem; margin-bottom: 16px; display: block; }
    .value-card h3 { font-size: 0.95rem; font-weight: 800; margin-bottom: 8px; }
    .value-card p { font-size: 0.82rem; color: var(--white-muted); line-height: 1.65; }
    @media (max-width: 768px) { .value-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .value-grid { grid-template-columns: 1fr; } }

    /* Disciplines */
    .disc-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-top: 40px; }
    .disc-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px 18px;
      transition: border-color 0.3s, transform 0.3s;
    }
    .disc-card:hover { border-color: var(--border-hover); transform: translateY(-3px); }
    .disc-card .emoji { font-size: 1.5rem; margin-bottom: 12px; display: block; }
    .disc-card h3 { font-size: 0.9rem; font-weight: 800; color: var(--green); margin-bottom: 6px; }
    .disc-card p { font-size: 0.75rem; color: var(--white-muted); line-height: 1.6; margin-bottom: 14px; }
    .disc-sa { display: flex; align-items: center; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border); }
    .disc-sa + .disc-sa { border-top: none; padding-top: 6px; }
    .disc-avatar {
      width: 26px; height: 26px; background: var(--green-bg2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; font-weight: 800; color: var(--green); flex-shrink: 0;
    }
    .disc-photo {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      object-fit: cover; border: 1.5px solid var(--border);
    }
    .disc-sa-info { font-size: 0.75rem; color: var(--white-dim); font-weight: 500; }
    .disc-sa-tz { font-size: 0.65rem; color: var(--white-muted); }
    @media (max-width: 1024px) { .disc-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 640px) { .disc-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 400px) { .disc-grid { grid-template-columns: 1fr; } }

    /* When */
    .trigger-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 40px; }
    .trigger-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 32px 24px; text-align: center;
      transition: border-color 0.3s, transform 0.3s;
    }
    .trigger-card:hover { border-color: var(--border-hover); transform: translateY(-3px); }
    .trigger-icon {
      width: 56px; height: 56px; background: var(--green-bg2);
      border: 1px solid var(--border); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin: 0 auto 20px;
    }
    .trigger-card h3 { font-size: 1rem; font-weight: 800; margin-bottom: 8px; }
    .trigger-card p { font-size: 0.85rem; color: var(--white-muted); line-height: 1.65; }
    @media (max-width: 768px) { .trigger-grid { grid-template-columns: 1fr; max-width: 400px; } }

    /* How */
    .how-grid { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 20px; align-items: start; margin-top: 40px; }
    .how-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 28px; transition: border-color 0.3s;
    }
    .how-card:hover { border-color: var(--border-hover); }
    .how-video {
      margin-top: 20px; border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border); cursor: pointer; position: relative;
    }
    .how-video:hover { border-color: var(--border-hover); }
    .how-video video {
      width: 100%; display: block; border-radius: 10px;
      image-rendering: -webkit-optimize-contrast;
    }
    .how-video-hint {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      padding: 4px 10px; border-radius: 6px;
      font-size: 0.6rem; font-weight: 600; color: var(--white-muted);
      letter-spacing: 0.08em; text-transform: uppercase;
      pointer-events: none; transition: opacity 0.2s;
    }
    .how-video:hover .how-video-hint { opacity: 0; }

    /* Video Modal */
    .video-modal {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px);
      align-items: center; justify-content: center; padding: 40px;
    }
    .video-modal.open { display: flex; }
    .video-modal-inner {
      max-width: 960px; width: 100%; position: relative;
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .video-modal-close {
      position: absolute; top: -40px; right: 0;
      background: none; border: none; color: var(--white-muted);
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .video-modal-close:hover { color: var(--white); }
    .video-modal video {
      width: 100%; border-radius: 14px;
      border: 1px solid var(--border);
      image-rendering: -webkit-optimize-contrast;
    }
    .video-modal-steps {
      margin-top: 20px; display: grid;
      grid-template-columns: repeat(5, 1fr); gap: 10px;
    }
    .video-modal-step {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 12px; text-align: center;
    }
    .video-modal-step-num {
      width: 24px; height: 24px; margin: 0 auto 8px;
      background: var(--green-bg2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; color: var(--green);
    }
    .video-modal-step p {
      font-size: 0.72rem; color: var(--white-dim); line-height: 1.5;
    }
    @media (max-width: 768px) {
      .video-modal { padding: 20px; }
      .video-modal-steps { grid-template-columns: 1fr; }
    }

    /* Profile Modal */
    .profile-modal {
      display: none; position: fixed; inset: 0; z-index: 210;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px);
      align-items: center; justify-content: center; padding: 40px;
    }
    .profile-modal.open { display: flex; }
    .profile-inner {
      max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto;
      background: #111714; border: 1px solid var(--border);
      border-radius: 18px; padding: 36px 32px;
      animation: modalIn 0.3s ease;
    }
    .profile-inner::-webkit-scrollbar { width: 4px; }
    .profile-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .profile-close {
      position: absolute; top: 16px; right: 20px;
      background: none; border: none; color: var(--white-muted);
      font-size: 1.2rem; cursor: pointer; transition: color 0.2s; z-index: 1;
    }
    .profile-close:hover { color: var(--white); }
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
    .profile-photo {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--border); flex-shrink: 0;
    }
    .profile-name { font-size: 1.3rem; font-weight: 900; }
    .profile-title { font-size: 0.8rem; color: var(--green); margin-top: 2px; }
    .profile-meta { font-size: 0.7rem; color: var(--white-muted); margin-top: 4px; line-height: 1.6; }
    .profile-section-label {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--green-dim);
      margin-top: 24px; margin-bottom: 12px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .profile-career { display: flex; flex-direction: column; gap: 12px; }
    .profile-career-item { display: flex; gap: 12px; align-items: flex-start; }
    .profile-career-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0; margin-top: 6px;
    }
    .profile-career-dot.past { background: var(--border); }
    .profile-career-role { font-size: 0.85rem; font-weight: 700; }
    .profile-career-co { font-size: 0.75rem; color: var(--white-muted); }
    .profile-career-desc { font-size: 0.72rem; color: var(--white-muted); margin-top: 2px; }
    .profile-skills { display: flex; flex-wrap: wrap; gap: 6px; }
    .profile-skill {
      padding: 4px 12px; border-radius: 100px; font-size: 0.65rem; font-weight: 600;
      background: var(--green-bg2); color: var(--green); border: 1px solid var(--border);
    }
    .profile-wins { display: flex; flex-direction: column; gap: 10px; }
    .profile-win { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 5px; transition: border-color 0.2s; }
    .profile-win:hover { border-color: var(--border-hover); }
    .profile-win-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .profile-win-brand { font-size: 0.82rem; font-weight: 700; color: var(--white); }
    .profile-win-link { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--green); font-weight: 600; text-decoration: none; flex-shrink: 0; }
    .profile-win-link:hover { opacity: 0.8; }
    .profile-win-link svg { width: 11px; height: 11px; }
    .profile-win-desc { font-size: 0.72rem; color: var(--white-muted); line-height: 1.5; }
    .profile-win-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .profile-contact {
      display: flex; gap: 10px; margin-top: 24px; padding-top: 16px;
      border-top: 1px solid var(--border); justify-content: center;
    }
    .profile-contact a {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 600;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--white-dim); transition: border-color 0.2s, color 0.2s;
    }
    .profile-contact a:hover { border-color: var(--border-hover); color: var(--green); }
    .has-profile { cursor: pointer; }
    .has-profile:hover { border-color: var(--green) !important; }

    /* ── Edit panel ── */
    .edit-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: flex-end; }
    .edit-modal.open { display: flex; }
    .edit-inner { background: #0b0f0d; border-left: 1px solid var(--border); width: 100%; max-width: 420px; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .edit-inner::-webkit-scrollbar { width: 4px; }
    .edit-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .edit-header { position: sticky; top: 0; background: #0a120d; border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 12px; z-index: 1; }
    .edit-header-photo { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
    .edit-header-name { font-size: 0.85rem; font-weight: 900; flex: 1; }
    .edit-header-sub { font-size: 0.62rem; color: var(--white-muted); margin-top: 1px; }
    .edit-admin-label { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); margin-bottom: 5px; }
    .edit-admin-select { width: 100%; background: rgba(16,24,20,0.7); border: 1px solid var(--border); color: var(--white); border-radius: 6px; padding: 6px 10px; font-size: 0.75rem; font-family: var(--font); cursor: pointer; outline: none; }
    .edit-admin-select:focus { border-color: var(--green); }
    .edit-close { background: none; border: none; color: var(--white-muted); font-size: 1.4rem; cursor: pointer; line-height: 1; padding: 0; }
    .edit-close:hover { color: var(--white); }
    .edit-body { padding: 20px; display: flex; flex-direction: column; gap: 24px; flex: 1; }
    .edit-section-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); margin-bottom: 10px; }
    .edit-card { background: rgba(16,24,20,0.7); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; gap: 10px; align-items: flex-start; }
    .edit-card-body { flex: 1; }
    .edit-card-role { font-size: 0.8rem; font-weight: 700; }
    .edit-card-sub { font-size: 0.68rem; color: var(--white-muted); margin-top: 2px; }
    .edit-remove { background: none; border: none; color: var(--border); font-size: 1rem; cursor: pointer; padding: 0; flex-shrink: 0; line-height: 1; transition: color 0.15s; }
    .edit-remove:hover { color: var(--coral); }
    .edit-add-form { background: rgba(16,24,20,0.5); border: 1px dashed var(--border-hover); border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .edit-input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--white); font-size: 0.78rem; padding: 4px 0; outline: none; width: 100%; font-family: var(--font); }
    .edit-input::placeholder { color: var(--white-muted); }
    .edit-input:focus { border-bottom-color: var(--green); }

  <script>
    // ── Fetch data from quick.db and render ──
    (async () => {
      try {
        const [[config], allPeople] = await Promise.all([
          quick.db.collection('site_config').find(),
          quick.db.collection('people').find()
        ]);

        // Store globally for admin panel and live discipline re-render
        window._allPeople = allPeople;
        window._siteConfig = config;

        // Build leadership / team shape — NORAM Lead always first
        const LEADERSHIP_ORDER = ['NORAM Lead', 'EMEA Lead'];
        const leadership = allPeople
          .filter(p => p.region === 'leadership')
          .sort((a, b) => LEADERSHIP_ORDER.indexOf(a.badge) - LEADERSHIP_ORDER.indexOf(b.badge));
        const team = {
          noram: allPeople.filter(p => p.region === 'noram'),
          emea:  allPeople.filter(p => p.region === 'emea')
        };

        // Build global profile lookup by full name and short name
        window._profiles = {};
        allPeople.forEach(p => {
          window._profiles[p.name] = p;
          const parts = p.name.split(' ');
          if (parts.length === 2) {
            window._profiles[parts[0] + ' ' + parts[1][0] + '.'] = p;
          } else if (parts.length >= 3) {
            const initials = parts.slice(1).map(w => w[0]).join('.') + '.';
            window._profiles[parts[0] + ' ' + initials] = p;
          }
        });

        // Derive disciplines for people who don't have an explicit disciplines array yet
        // Also normalize any legacy discipline names (e.g. "Retail" → "Retail / POS")
        const normDisc = d => DISCIPLINE_ALIASES[d] || d;
        allPeople.forEach(p => {
          if (!p.disciplines) {
            p.disciplines = config.disciplines
              .filter(d => (d.memberSlackIds || []).includes(p.slackId))
              .map(d => normDisc(d.name));
          } else {
            p.disciplines = p.disciplines.map(normDisc);
          }
        });

        // Normalize discipline names in site_config and resolve members from person.disciplines
        config.disciplines = config.disciplines.map(d => ({
          ...d,
          name: normDisc(d.name),
          members: allPeople.filter(p => (p.disciplines || []).includes(normDisc(d.name)))
        }));

        document.title = 'SA-entral | Enterprise Solutions Architects';
        renderHero(config.hero);
        renderStats(config.stats);
        renderValue(config.valuePillars);
        renderTeam(leadership, team);
        renderDisciplines(config.disciplines);
        renderTriggers(config.triggers);
        renderHow(config.engagementPaths);
        renderRules(config.rules);
        renderExamples(config.examples);
        renderResources(config.resources);
        initAnimations();
        initIdentity(allPeople);
      } catch (err) {
        console.error(err);
        document.getElementById('heroContent').innerHTML =
          `<h1 style="font-size:2rem;margin-top:40px">Failed to load data</h1><p class="hero-desc">Check the console for details.</p>`;
      }
    })();

    // ── Identity & edit access ──
    const ADMIN_SLACK_IDS = ['U03L3D490F9', 'U09H7GYPVRV'];

    // Current Vault photo URLs — update this table when someone changes their photo
    const VAULT_PHOTOS = {
      'U03L3D490F9': 'https://cdn.shopify.com/b/u2-files-production-bucket/7qqdl01rs74nhyjqhrlq3bbgzt6n.webp',
      'U09H7GYPVRV': 'https://cdn.shopify.com/b/u2-files-production-bucket/v317az3ul6sq43yu2cy6hmf9fivm.jpg',
      'U09SSUZCK0R': 'https://cdn.shopify.com/b/u2-files-production-bucket/h2maii79chexf6i1um4t1xq7rf7i.jpg',
      'U08J87BE9A9': 'https://cdn.shopify.com/b/u2-files-production-bucket/glthbs5a7guygutaxmrh3kjt4ix9.webp',
      'U08J2TLJ58E': 'https://cdn.shopify.com/b/u2-files-production-bucket/no8f1dp15fr9mb24sk2axzcy740t.webp',
      'U05APCQ6EFK': 'https://cdn.shopify.com/b/u2-files-production-bucket/jc0knvvr8m66fa1ndf6vuaspojj1.webp',
      'U099LU9R4EA': 'https://cdn.shopify.com/b/u2-files-production-bucket/bwdqqaw4bh9kiv6jznuv6blbg7z8.webp',
      'U09GJEFGBE2': 'https://cdn.shopify.com/b/u2-files-production-bucket/pn38m8zpetj2ib8v81uajf2pmg64.jpg',
      'W018GA4N361': 'https://cdn.shopify.com/b/u2-files-production-bucket/plvemmt3hjwpyag2b2u920fagz3a.webp',
      'W0197GH2D4Y': 'https://cdn.shopify.com/b/u2-files-production-bucket/j5ohl6t32red3a6rbxjonzbmkc0f.webp',
      'U08HABDQEAE': 'https://cdn.shopify.com/b/u2-files-production-bucket/pnpnhqtfph1eo5iyzkfuvk9z79ws.webp',
      'U09BLDEFM9V': 'https://cdn.shopify.com/b/u2-files-production-bucket/x2f8vud8hjwdzrj51dqietwbw1l1.webp',
      'U0AHY4SHMA6': 'https://cdn.shopify.com/b/u2-files-production-bucket/0axdjyvyco3s9ufsklnmz4i2bmgc.png'
    };

    async function initIdentity(allPeople) {
      try {
        const user = await quick.id.waitForUser();
        const match = allPeople.find(p => p.slackId === user.slackId);
        if (!match) return;
        window._currentUser = match;
        window._isAdmin = ADMIN_SLACK_IDS.includes(match.slackId);
        document.getElementById('navEditBtn').classList.add('visible');
      } catch (e) {
        // Not on Quick or identity unavailable — edit button stays hidden
      }
    }

    async function syncPhotos() {
      const btn = document.getElementById('syncPhotosBtn');
      const status = document.getElementById('syncPhotosStatus');
      btn.disabled = true;
      btn.textContent = '↻ Syncing…';
      const people = window._allPeople || [];
      let updated = 0;
      for (const person of people) {
        const vaultUrl = VAULT_PHOTOS[person.slackId];
        if (vaultUrl && person.photo !== vaultUrl) {
          await quick.db.collection('people').update(person.id, { photo: vaultUrl });
          person.photo = vaultUrl;
          // Update visible avatar if this person is currently being edited
          if (window._editTarget && window._editTarget.slackId === person.slackId) {
            document.getElementById('editHeaderPhoto').src = vaultUrl;
          }
          updated++;
        }
      }
      btn.disabled = false;
      btn.textContent = '↻ Sync Photos from Vault';
      status.textContent = updated > 0 ? `✓ Updated ${updated} photo${updated > 1 ? 's' : ''}` : '✓ All photos up to date';
      if (updated > 0) renderTeam(
        people.filter(p => p.region === 'leadership').sort((a,b) => ['NORAM Lead','EMEA Lead'].indexOf(a.badge) - ['NORAM Lead','EMEA Lead'].indexOf(b.badge)),
        { noram: people.filter(p => p.region === 'noram'), emea: people.filter(p => p.region === 'emea') }
      );
    }

    // ── Career ──
    function sortCareer(career) {
      return [...career].sort((a, b) => {
        const endDiff = careerEndYear(b.period) - careerEndYear(a.period);
        if (endDiff !== 0) return endDiff;
        return careerStartYear(b.period) - careerStartYear(a.period);
      });
    }
    function careerEndYear(period) {
      if (!period) return 0;
      if (/present|current/i.test(period)) return 9999;
      const years = period.match(/\d{4}/g);
      return years ? parseInt(years[years.length - 1]) : 0;
    }
    function careerStartYear(period) {
      if (!period) return 0;
      const years = period.match(/\d{4}/g);
      return years ? parseInt(years[0]) : 0;
    }

          const wins = [...window._editTarget.wins];
          wins.splice(i, 1);
          await saveCurrentUser({ wins });

        });

      document.querySelectorAll('#discPicker .disc-tag').forEach(tag => {
        tag.addEventListener('click', e => {
          if (e.target.classList.contains('disc-tag-remove')) return;
          tag.classList.toggle('active');
        });
      });

      document.querySelectorAll('#discPicker [data-remove-disc]').forEach(btn => {
        btn.addEventListener('click', async e => {
          e.stopPropagation();
          const disc = btn.dataset.removeDisc;
          const wins = window._editTarget.wins.map(w => ({
            ...w,
            disciplines: (w.disciplines || []).filter(d => d !== disc)
          }));
          await saveCurrentUser({ wins });
          renderEditBody();
        });
      });

      function addCustomDisc() {
        const val = document.getElementById('discCustomInput').value.trim();
        if (!val || PRESET_DISCIPLINES.includes(val)) return;
        const picker = document.getElementById('discPicker');
        if (Array.from(picker.querySelectorAll('.disc-tag')).some(t => t.dataset.disc === val)) {
          document.getElementById('discCustomInput').value = '';
          return;
        }
        const tag = document.createElement('span');
        tag.className = 'disc-tag custom active';
        tag.dataset.disc = val;
        tag.innerHTML = `${esc(val)}<button class="disc-tag-remove" title="Remove custom">✕</button>`;
        tag.addEventListener('click', e => {
          if (e.target.classList.contains('disc-tag-remove')) { tag.remove(); return; }
          tag.classList.toggle('active');
        });
        picker.appendChild(tag);
        document.getElementById('discCustomInput').value = '';
      }

      document.getElementById('discCustomAddBtn').addEventListener('click', addCustomDisc);
      document.getElementById('discCustomInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addCustomDisc();
      });

      document.getElementById('winAddBtn').addEventListener('click', async () => {
        const brand = document.getElementById('winBrand').value.trim();

        await saveCurrentUser({ wins });
        renderEditBody();
      });
    }

          <path fill="#ECB22E" d="M77.6 97c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9-12.9-5.8-12.9-12.9V97h12.9zm0-6.5c-7.1 0-12.9-5.8-12.9-12.9s5.8-12.9 12.9-12.9h32.3c7.1 0 12.9 5.8 12.9 12.9s-5.8 12.9-12.9 12.9H77.6z"/>
        </svg>
      </a>`;
    }

    function renderTeam(leadership, team) {
      const delays = ['', ' d1', ' d2', ' d3', ' d4', ' d4'];
      document.getElementById('teamSection').innerHTML = `
        <div class="label reveal">The Humans</div>
        <h2 class="heading reveal d1">Meet the <em>team.</em></h2>
        <p class="subtext reveal d2">Enterprise Solutions Architects spanning NORAM and EMEA, covering every major technical discipline.</p>

        <div class="team-region-label reveal">Leadership</div>
        <div class="lead-grid">${leadership.map((l, i) => `
          <div class="lead-card reveal${delays[i] || ''}${personClick(l.name)}
            ${slackBtn(l.slackId, l.name)}
            <img class="lead-photo" src="${l.photo}" alt="${l.name}">
            <div>
              <div class="lead-name">${l.name}</div>
              <div class="lead-title">${l.title}</div>
              <div class="lead-region">${l.location}</div>
              <span class="lead-badge">${l.badge}</span>
            </div>
          </div>`).join('')}
        </div>

        ${Object.entries(team).map(([region, members]) => `
          <div class="team-region-label reveal">${region.toUpperCase()}</div>
          <div class="team-grid">${members.map((m, i) => `
            <div class="team-card reveal${delays[i] || ''}${personClick(m.name)}
              ${slackBtn(m.slackId, m.name)}
              <img class="team-photo" src="${m.photo}" alt="${m.name}">
              <div>
                <div class="team-name">${m.name}</div>
                <div class="team-spec" data-person-spec="${m.slackId}">${(m.disciplines && m.disciplines.length) ? m.disciplines.join(' · ') : (m.specialty || '')}</div>
                <div class="team-tz">${m.location}</div>
              </div>
            </div>`).join('')}
          </div>`).join('')}`;
    }

    // ── Animations (initialized after render) ──
    function initAnimations() {
      // Scroll reveal
      const reveals = document.querySelectorAll('.reveal');
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
      reveals.forEach(el => obs.observe(el));

      // Count-up
      function animateCount(el) {
        const text = el.textContent.trim();
        const match = text.match(/^([^\d]*)(\d+)([^\d]*)$/);
        if (!match) return;
        const prefix = match[1], target = parseInt(match[2]), suffix = match[3];
        const duration = 1200, start = performance.now();
        el.textContent = prefix + '0' + suffix;
        function tick(now) {
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = prefix + Math.round(target * eased) + suffix;
          if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }
      const statNums = document.querySelectorAll('.stat-num');
      const statObs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting && !e.target.dataset.counted) {
            e.target.dataset.counted = 'true';
            animateCount(e.target);
          }
        });
      }, { threshold: 0.5 });
      statNums.forEach(el => statObs.observe(el));

      // Profile click delegation
      document.querySelectorAll('[data-profile]').forEach(el => {
        el.addEventListener('click', () => openProfile(el.dataset.profile));
      });
    }

    // ── Profile modal ──
    function openProfile(name) {
      const p = window._profiles[name];
      if (!p) return;
      let tenure = '';
      let sinceYear = '';
      if (p.startDate) {
        const start = new Date(p.startDate);
        const now = new Date();
        let months = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
        if (now.getDate() < start.getDate()) months -= 1;
        if (months < 0) months = 0;
        const y = Math.floor(months / 12);
        const m = months % 12;
        const yStr = y ? y + 'yr' : '';
        const mStr = m ? m + 'mo' : '';
        tenure = [yStr, mStr].filter(Boolean).join(' ') || '0mo';
        sinceYear = start.getFullYear();
      }

      document.getElementById('profileContent').innerHTML = `
        <div class="profile-header">
          <img class="profile-photo" src="${p.photo}" alt="${p.name}">
          <div>
            <div class="profile-name">${p.name}</div>
            <div class="profile-title">${p.title || ''}</div>
            <div class="profile-meta">
              ${p.specialty ? p.specialty + '<br>' : ''}
              ${p.location || ''}
              ${sinceYear ? '<br>At Shopify since ' + sinceYear + ' (' + tenure + ')' : ''}
            </div>
          </div>
        </div>

        ${p.disciplines && p.disciplines.length ? `
          <div class="profile-section-label">Disciplines</div>
          <div class="profile-skills">
            ${p.disciplines.map(d => '<span class="profile-skill">' + esc(d) + '</span>').join('')}
          </div>` : ''}

        ${p.career && p.career.length ? `
          <div class="profile-section-label">Career</div>
          <div class="profile-career">
            ${p.career.map((c, i) => `
              <div class="profile-career-item">
                <div class="profile-career-dot${i > 0 ? ' past' : ''}"></div>
                <div>
                  <div class="profile-career-role">${esc(c.role)}</div>
                  <div class="profile-career-co">${esc(c.company)} \u00b7 ${esc(c.period)}</div>
                  ${c.description ? '<div class="profile-career-desc">' + esc(c.description) + '</div>' : ''}
                </div>
              </div>`).join('')}
          </div>` : ''}

        ${p.skills && p.skills.length ? `
          <div class="profile-section-label">Skills</div>
          <div class="profile-skills">
            ${p.skills.map(s => '<span class="profile-skill">' + esc(s) + '</span>').join('')}
          </div>` : ''}

        ${p.wins && p.wins.length ? `
          <div class="profile-section-label">Notable Deal Wins</div>
          <div class="profile-wins">
            ${p.wins.map(w => {
              if (typeof w === 'string') return `<div class="profile-win"><div class="profile-win-brand">${esc(w)}</div></div>`;
              const linkEl = w.url
                ? `<a class="profile-win-link" href="${esc(w.url)}" target="_blank" rel="noopener"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 2H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7M8 1h3m0 0v3m0-3L5 7"/></svg> Visit</a>`
                : '';
              const desc = w.description ? `<div class="profile-win-desc">${esc(w.description)}</div>` : '';
              const tags = (w.disciplines && w.disciplines.length)
                ? `<div class="profile-win-tags">${w.disciplines.map(d => `<span style="font-size:0.58rem;background:var(--green-bg);color:var(--white-muted);border-radius:3px;padding:1px 6px">${esc(d)}</span>`).join('')}</div>`
                : '';
              return `<div class="profile-win">
                <div class="profile-win-header">
                  <div class="profile-win-brand">${esc(w.brand)}</div>
                  ${linkEl}
                </div>
                ${desc}${tags}
              </div>`;
            }).join('')}
          </div>` : ''}

        <div class="profile-contact">
          ${p.slackId ? '<a href="https://shopify.slack.com/app_redirect?channel=' + p.slackId + '" target="_blank">💬 Message on Slack</a>' : ''}
        </div>`;

      document.getElementById('profileModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('profileClose').addEventListener('click', closeProfile);
    document.getElementById('profileModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeProfile();
    });
    function closeProfile() {
      document.getElementById('profileModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ── Video modal ──
    function openVideoModal(src, steps) {
      const modal = document.getElementById('videoModal');
      const player = document.getElementById('videoModalPlayer');
      const stepsEl = document.getElementById('videoModalSteps');
      player.src = src;
      stepsEl.innerHTML = (steps || []).map((s, i) => `
        <div class="video-modal-step">
          <div class="video-modal-step-num">${i + 1}</div>
          <p>${s}</p>
        </div>`).join('');
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    document.getElementById('videoModalClose').addEventListener('click', closeVideoModal);
    document.getElementById('videoModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeVideoModal();
    });
    function closeVideoModal() {
      const modal = document.getElementById('videoModal');
      modal.classList.remove('open');
      document.getElementById('videoModalPlayer').src = '';
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeVideoModal(); closeProfile(); closeEditPanel(); }
    });

    // ── Mobile nav ──
    document.getElementById('navToggle').addEventListener('click', () =>
      document.getElementById('navLinks').classList.toggle('open'));
    document.getElementById('navLinks').querySelectorAll('a').forEach(a =>
      a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open')));
  </script>
</body>
