<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA-entral | Enterprise Solutions Architects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0F0D;
      --bg-card: rgba(16, 24, 20, 0.7);
      --bg-card-hover: rgba(20, 32, 26, 0.85);
      --border: rgba(0, 200, 83, 0.12);
      --border-hover: rgba(0, 200, 83, 0.3);
      --green: #00C853;
      --green-dim: rgba(0, 200, 83, 0.6);
      --green-bg: rgba(0, 200, 83, 0.08);
      --green-bg2: rgba(0, 200, 83, 0.15);
      --white: #F0F0F0;
      --white-dim: rgba(240, 240, 240, 0.7);
      --white-muted: rgba(240, 240, 240, 0.4);
      --coral: #FF6B6B;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: 72px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        linear-gradient(rgba(0, 200, 83, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 200, 83, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      background-attachment: fixed;
      color: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
    .label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--green); margin-bottom: 16px;
    }
    .heading {
      font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900;
      line-height: 1.05; text-transform: uppercase;
      letter-spacing: -0.02em; margin-bottom: 20px;
    }
    .heading em { font-style: italic; color: var(--green); }
    .subtext {
      font-size: 0.95rem; color: var(--white-dim);
      max-width: 620px; line-height: 1.7;
    }
    hr { border: none; height: 1px; background: var(--border); margin: 0; }

    .reveal {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .d1 { transition-delay: 0.08s; }
    .d2 { transition-delay: 0.16s; }
    .d3 { transition-delay: 0.24s; }
    .d4 { transition-delay: 0.32s; }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(11, 15, 13, 0.8);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1140px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 0.95rem; }
    .nav-brand .badge {
      background: var(--green); color: var(--bg);
      padding: 2px 8px; border-radius: 4px;
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em;
    }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { font-size: 0.8rem; font-weight: 600; color: var(--white-muted); transition: color 0.2s; }
    .nav-links a:hover { color: var(--white); }
    .nav-cta {
      background: var(--green) !important; color: var(--bg) !important;
      padding: 7px 16px !important; border-radius: 6px !important;
      font-weight: 700 !important; font-size: 0.75rem !important;
    }
    .nav-cta:hover { opacity: 0.85 !important; }
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
    .nav-toggle span { display: block; width: 20px; height: 2px; background: var(--white); margin: 4px 0; }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column; position: absolute;
        top: 60px; left: 0; right: 0; background: var(--bg);
        padding: 20px 24px; border-bottom: 1px solid var(--border); gap: 16px;
      }
      .nav-toggle { display: block; }
    }

    /* Hero */
    .hero { min-height: 100vh; display: flex; align-items: center; padding: 120px 0 80px; position: relative; }
    .hero::after {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 400px;
      background: radial-gradient(ellipse at 50% 100%, rgba(0, 200, 83, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-content { max-width: 700px; }
    .hero-applying {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--green);
      background: var(--green-bg); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 100px; margin-bottom: 32px;
    }
    .hero h1 {
      font-size: clamp(3rem, 7vw, 5.5rem); font-weight: 900;
      line-height: 0.95; text-transform: uppercase; letter-spacing: -0.03em; margin-bottom: 24px;
    }
    .hero h1 em { display: block; color: var(--green); font-style: italic; }
    .hero-role { font-size: 1rem; font-weight: 600; color: var(--white-dim); margin-bottom: 20px; }
    .hero-role strong { color: var(--white); }
    .hero-desc { font-size: 0.95rem; color: var(--white-muted); line-height: 1.8; max-width: 580px; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
      border: 1px solid var(--border); transition: all 0.2s; cursor: pointer;
    }
    .btn-primary { background: var(--green); color: var(--bg); border-color: var(--green); }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: transparent; color: var(--white); }
    .btn-ghost:hover { border-color: var(--border-hover); background: var(--green-bg); }
    .scroll-hint {
      text-align: center; margin-top: 60px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--white-muted);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: fadeIn 1s 1.2s ease both;
    }
    .scroll-hint::after {
      content: '';
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--green), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(0.6) translateY(0); }
      50% { opacity: 1; transform: scaleY(1) translateY(8px); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Stats */
    .stats-bar { padding: 48px 0; }
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px 20px;
    }
    .stat-num { font-size: 1.8rem; font-weight: 900; color: var(--green); line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 0.7rem; color: var(--white-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

    .section { padding: 80px 0; }

    /* Value */
    .value-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 40px; }
    .value-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px 22px;
      transition: border-color 0.3s, transform 0.3s, background 0.3s;
    }
    .value-card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); transform: translateY(-3px); }
    .value-card-icon { font-size: 1.6rem; margin-bottom: 16px; display: block; }
    .value-card h3 { font-size: 0.95rem; font-weight: 800; margin-bottom: 8px; }
    .value-card p { font-size: 0.82rem; color: var(--white-muted); line-height: 1.65; }
    @media (max-width: 768px) { .value-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .value-grid { grid-template-columns: 1fr; } }

    /* Disciplines */
    .disc-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-top: 40px; }
    .disc-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px 18px;
      transition: border-color 0.3s, transform 0.3s;
    }
    .disc-card:hover { border-color: var(--border-hover); transform: translateY(-3px); }
    .disc-card .emoji { font-size: 1.5rem; margin-bottom: 12px; display: block; }
    .disc-card h3 { font-size: 0.9rem; font-weight: 800; color: var(--green); margin-bottom: 6px; }
    .disc-card p { font-size: 0.75rem; color: var(--white-muted); line-height: 1.6; margin-bottom: 14px; }
    .disc-sa { display: flex; align-items: center; gap: 8px; padding-top: 12px; border-top: 1px solid var(--border); }
    .disc-sa + .disc-sa { border-top: none; padding-top: 6px; }
    .disc-avatar {
      width: 26px; height: 26px; background: var(--green-bg2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; font-weight: 800; color: var(--green); flex-shrink: 0;
    }
    .disc-photo {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      object-fit: cover; border: 1.5px solid var(--border);
    }
    .disc-sa-info { font-size: 0.75rem; color: var(--white-dim); font-weight: 500; }
    .disc-sa-tz { font-size: 0.65rem; color: var(--white-muted); }
    @media (max-width: 1024px) { .disc-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 640px) { .disc-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 400px) { .disc-grid { grid-template-columns: 1fr; } }

    /* When */
    .trigger-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 40px; }
    .trigger-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 32px 24px; text-align: center;
      transition: border-color 0.3s, transform 0.3s;
    }
    .trigger-card:hover { border-color: var(--border-hover); transform: translateY(-3px); }
    .trigger-icon {
      width: 56px; height: 56px; background: var(--green-bg2);
      border: 1px solid var(--border); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin: 0 auto 20px;
    }
    .trigger-card h3 { font-size: 1rem; font-weight: 800; margin-bottom: 8px; }
    .trigger-card p { font-size: 0.85rem; color: var(--white-muted); line-height: 1.65; }
    @media (max-width: 768px) { .trigger-grid { grid-template-columns: 1fr; max-width: 400px; } }

    /* How */
    .how-grid { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 20px; align-items: start; margin-top: 40px; }
    .how-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 28px; transition: border-color 0.3s;
    }
    .how-card:hover { border-color: var(--border-hover); }
    .how-badge {
      display: inline-block; padding: 4px 10px; border-radius: 100px;
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 16px;
    }
    .how-badge-green { background: var(--green-bg2); color: var(--green); }
    .how-badge-coral { background: rgba(255, 107, 107, 0.15); color: var(--coral); }
    .how-card h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; }
    .how-card > p { font-size: 0.85rem; color: var(--white-muted); line-height: 1.65; margin-bottom: 20px; }
    .how-steps { display: flex; flex-direction: column; gap: 14px; }
    .how-step { display: flex; gap: 12px; align-items: flex-start; }
    .how-step-num {
      min-width: 26px; height: 26px; background: var(--green-bg2); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; color: var(--green); flex-shrink: 0; margin-top: 1px;
    }
    .how-step p { font-size: 0.85rem; color: var(--white-dim); }
    .how-step strong { color: var(--white); }
    .how-or { display: flex; flex-direction: column; align-items: center; gap: 8px; padding-top: 60px; color: var(--white-muted); }
    .how-or-line { width: 1px; height: 50px; background: var(--border); }
    .how-or span { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; }
    @media (max-width: 768px) {
      .how-grid { grid-template-columns: 1fr; }
      .how-or { flex-direction: row; padding: 0; }
      .how-or-line { width: 40px; height: 1px; }
    }

    /* Rules */
    .rules-split { display: grid; grid-template-columns: 1fr 1fr; }
    .rules-col { padding: 80px 48px; }
    .rules-do { background: rgba(0, 200, 83, 0.04); border-right: 1px solid var(--border); }
    .rules-dont { background: rgba(255, 107, 107, 0.03); }
    .rules-col-inner { max-width: 440px; margin: 0 auto; }
    .rules-col h2 {
      font-size: clamp(2.5rem, 4vw, 4rem); font-weight: 900;
      text-transform: uppercase; line-height: 1; margin-bottom: 40px;
    }
    .rules-do h2 { color: var(--green); }
    .rules-dont h2 { color: var(--coral); }
    .rules-list { display: flex; flex-direction: column; gap: 24px; }
    .rules-item { display: flex; gap: 14px; align-items: flex-start; }
    .rules-icon {
      min-width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0; margin-top: 2px;
    }
    .rules-do .rules-icon { background: var(--green-bg2); color: var(--green); }
    .rules-dont .rules-icon { background: rgba(255, 107, 107, 0.15); color: var(--coral); }
    .rules-item p { font-size: 0.9rem; color: var(--white-dim); line-height: 1.7; }
    @media (max-width: 768px) {
      .rules-split { grid-template-columns: 1fr; }
      .rules-col { padding: 60px 24px; }
      .rules-do { border-right: none; border-bottom: 1px solid var(--border); }
    }

    /* Examples */
    .ex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 40px; }
    .ex-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }
    .ex-card:hover { border-color: var(--border-hover); transform: translateY(-3px); }
    .ex-tags {
      padding: 14px 18px; background: rgba(0, 200, 83, 0.06);
      border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap;
    }
    .ex-tag {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 3px 10px;
      border-radius: 100px; background: var(--green-bg2); color: var(--green);
    }
    .ex-body { padding: 22px 18px; }
    .ex-card h3 { font-size: 0.95rem; font-weight: 800; margin-bottom: 8px; }
    .ex-card p { font-size: 0.82rem; color: var(--white-muted); line-height: 1.65; }
    @media (max-width: 768px) { .ex-grid { grid-template-columns: 1fr; } }

    /* Resources */
    .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 40px; }
    .res-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px 22px;
      transition: border-color 0.3s, transform 0.3s; display: flex; flex-direction: column;
    }
    .res-card:hover { border-color: var(--border-hover); transform: translateY(-3px); }
    .res-icon {
      width: 48px; height: 48px; background: var(--green-bg2); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; margin-bottom: 18px;
    }
    .res-card h3 { font-size: 0.95rem; font-weight: 800; margin-bottom: 8px; }
    .res-card p { font-size: 0.82rem; color: var(--white-muted); line-height: 1.65; margin-bottom: 16px; }
    .res-link {
      font-size: 0.75rem; font-weight: 700; color: var(--green);
      display: inline-flex; align-items: center; gap: 4px; margin-top: auto; transition: gap 0.2s;
    }
    .res-card:hover .res-link { gap: 8px; }
    @media (max-width: 768px) { .res-grid { grid-template-columns: 1fr; max-width: 400px; } }

    /* Leadership */
    .lead-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 40px; max-width: 700px; margin-left: auto; margin-right: auto; }
    .lead-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 24px;
      display: flex; align-items: center; gap: 20px;
      transition: border-color 0.3s, transform 0.2s;
    }
    .lead-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .lead-photo {
      width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
      object-fit: cover; border: 2px solid var(--border);
    }
    .lead-name { font-size: 1.05rem; font-weight: 800; }
    .lead-title { font-size: 0.8rem; color: var(--green); margin-top: 2px; }
    .lead-region { font-size: 0.7rem; color: var(--white-muted); margin-top: 2px; }
    .lead-badge {
      display: inline-block; margin-top: 6px; padding: 2px 8px; border-radius: 100px;
      font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      background: var(--green-bg2); color: var(--green);
    }
    @media (max-width: 640px) { .lead-grid { grid-template-columns: 1fr; } }

    /* Team */
    .team-region-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--green-dim); margin-top: 32px; margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .team-region-label:first-of-type { margin-top: 40px; }
    .team-region-label { max-width: 960px; margin-left: auto; margin-right: auto; }
    .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 960px; margin-left: auto; margin-right: auto; }
    .team-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 14px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.3s, transform 0.2s;
    }
    .team-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .team-photo {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      object-fit: cover; border: 2px solid var(--border);
    }
    .team-name { font-size: 0.85rem; font-weight: 700; }
    .team-spec { font-size: 0.72rem; color: var(--green); }
    .team-tz { font-size: 0.62rem; color: var(--white-muted); margin-top: 1px; }
    @media (max-width: 768px) { .team-grid { grid-template-columns: 1fr 1fr; } .lead-grid { grid-template-columns: 1fr; } }
    @media (max-width: 480px) { .team-grid { grid-template-columns: 1fr; } }

    /* Footer */
    footer { border-top: 1px solid var(--border); padding: 40px 0; }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .footer-brand { display: flex; align-items: center; gap: 8px; }
    .footer-brand strong { font-size: 0.85rem; }
    .footer-brand span { font-size: 0.75rem; color: var(--white-muted); }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 0.75rem; color: var(--white-muted); font-weight: 500; transition: color 0.2s; }
    .footer-links a:hover { color: var(--green); }
    .footer-date { font-size: 0.7rem; color: var(--white-muted); }
  </style>
</head>
<body>

  <!-- Nav (static — not data-driven) -->
  <nav>
    <div class="nav-inner">
      <a href="#" class="nav-brand">SA-entral <span class="badge">ENTERPRISE</span></a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="nav-links" id="navLinks">
        <a href="#value">Value</a>
        <a href="#disciplines">Disciplines</a>
        <a href="#when">When</a>
        <a href="#how">How</a>
        <a href="#rules">DOs &amp; DON'Ts</a>
        <a href="#resources">Resources</a>
        <a href="#team">Team</a>
        <a href="#how" class="nav-cta">Request an SA</a>
      </div>
    </div>
  </nav>

  <!-- Sections — rendered from data.json -->
  <section class="hero" id="hero"><div class="container"><div id="heroContent" class="hero-content"></div><div class="scroll-hint">Scroll</div></div></section>
  <section class="stats-bar"><div class="container"><div id="statsRow" class="stats-row reveal"></div></div></section>
  <hr>
  <section class="section" id="value"><div class="container" id="valueSection"></div></section>
  <hr>
  <section class="section" id="disciplines"><div class="container" id="discSection"></div></section>
  <hr>
  <section class="section" id="when"><div class="container" id="whenSection"></div></section>
  <hr>
  <section class="section" id="how"><div class="container" id="howSection"></div></section>
  <section id="rules"><div id="rulesSection"></div></section>
  <hr>
  <section class="section" id="examples"><div class="container" id="exSection"></div></section>
  <hr>
  <section class="section" id="resources"><div class="container" id="resSection"></div></section>
  <hr>
  <section class="section" id="team"><div class="container" id="teamSection"></div></section>

  <!-- Footer (static) -->
  <footer>
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand"><strong>SA-entral</strong><span>&middot; Enterprise Solutions Architecture</span></div>
        <div class="footer-links">
          <a href="#">#ask-an-architect</a>
          <a href="https://docs.google.com/presentation/d/17yJhuugog3MWpYS04qrjPDV5Ck36sSzqzmxLqfizoCg" target="_blank">Source Deck</a>
        </div>
        <div class="footer-date">Updated April 2026</div>
      </div>
    </div>
  </footer>

  <script>
    // ── Fetch data and render ──
    fetch('./data.json')
      .then(r => r.json())
      .then(data => {
        renderHero(data.hero);
        renderStats(data.stats);
        renderValue(data.valuePillars);
        renderDisciplines(data.disciplines);
        renderTriggers(data.triggers);
        renderHow(data.engagementPaths);
        renderRules(data.rules);
        renderExamples(data.examples);
        renderResources(data.resources);
        renderTeam(data.leadership, data.team);
        initAnimations();
      });

    function renderHero(h) {
      document.getElementById('heroContent').innerHTML = `
        <div class="hero-applying">${h.badge}</div>
        <h1>${h.title}<em>${h.titleEmphasis}</em></h1>
        <p class="hero-role"><strong>${h.subtitle}</strong></p>
        <p class="hero-desc">${h.description}</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <a href="#how" class="btn btn-primary">\u26a1 Request an SA</a>
          <a href="#when" class="btn btn-ghost">\u25cc When to engage?</a>
        </div>`;
    }

    function renderStats(stats) {
      document.getElementById('statsRow').innerHTML = stats.map(s =>
        `<div class="stat-card"><div class="stat-num"${s.isEmoji || s.isSymbol ? '' : ' data-countup'}>${s.value}</div><div class="stat-label">${s.label}</div></div>`
      ).join('');
    }

    function renderValue(pillars) {
      const delays = ['', ' d1', ' d2', ' d3'];
      document.getElementById('valueSection').innerHTML = `
        <div class="label reveal">What We Do</div>
        <h2 class="heading reveal d1">The value <em>we bring.</em></h2>
        <p class="subtext reveal d2">Four pillars that define how Solutions Architects elevate enterprise engagements.</p>
        <div class="value-grid">${pillars.map((p, i) => `
          <div class="value-card reveal${delays[i] || ''}">
            <span class="value-card-icon">${p.icon}</span>
            <h3>${p.title}</h3>
            <p>${p.description}</p>
          </div>`).join('')}
        </div>`;
    }

    function renderDisciplines(discs) {
      const delays = ['', ' d1', ' d2', ' d3', ' d4', ' d4'];
      document.getElementById('discSection').innerHTML = `
        <div class="label reveal">Specializations</div>
        <h2 class="heading reveal d1">Our <em>disciplines.</em></h2>
        <p class="subtext reveal d2">Each SA specializes in specific technical domains, ensuring deep expertise where it matters most.</p>
        <div class="disc-grid">${discs.map((d, i) => `
          <div class="disc-card reveal${delays[i] || ''}">
            <span class="emoji">${d.icon}</span>
            <h3>${d.name}</h3>
            <p>${d.description}</p>
            ${d.members.map((m, mi) => `
              <div class="disc-sa"${mi > 0 ? ' style="border-top:none;padding-top:6px"' : ''}>
                ${m.photo
                  ? `<img class="disc-photo" src="${m.photo}" alt="${m.name}">`
                  : `<div class="disc-avatar">${m.initials || m.name.split(' ').map(w=>w[0]).join('')}</div>`}
                <div><div class="disc-sa-info">${m.name}</div><div class="disc-sa-tz">${m.location}</div></div>
              </div>`).join('')}
          </div>`).join('')}
        </div>`;
    }

    function renderTriggers(triggers) {
      const delays = ['', ' d1', ' d2'];
      document.getElementById('whenSection').innerHTML = `
        <div class="label reveal">Decision Guide</div>
        <h2 class="heading reveal d1">When to <em>engage.</em></h2>
        <p class="subtext reveal d2">Three signals that it's time to bring in a Solutions Architect.</p>
        <div class="trigger-grid">${triggers.map((t, i) => `
          <div class="trigger-card reveal${delays[i] || ''}">
            <div class="trigger-icon">${t.icon}</div>
            <h3>${t.title}</h3>
            <p>${t.description}</p>
          </div>`).join('')}
        </div>`;
    }

    function renderHow(paths) {
      document.getElementById('howSection').innerHTML = `
        <div class="label reveal">Two Paths</div>
        <h2 class="heading reveal d1">How to <em>engage.</em></h2>
        <p class="subtext reveal d2">Choose the right engagement model for your need.</p>
        <div class="how-grid">
          ${paths.map((p, i) => {
            const card = `<div class="how-card reveal${i > 0 ? ' d2' : ''}">
              <span class="how-badge how-badge-${p.badgeType}">${p.badge}</span>
              <h3>${p.title}</h3>
              <p>${p.description}</p>
              <div class="how-steps">${p.steps.map((s, si) => `
                <div class="how-step"><div class="how-step-num">${si+1}</div><p>${s}</p></div>`).join('')}
              </div>
            </div>`;
            if (i === 0) return card + `<div class="how-or reveal d1"><div class="how-or-line"></div><span>or</span><div class="how-or-line"></div></div>`;
            return card;
          }).join('')}
        </div>`;
    }

    function renderRules(rules) {
      document.getElementById('rulesSection').innerHTML = `
        <div class="rules-split">
          <div class="rules-col rules-do"><div class="rules-col-inner reveal">
            <h2>DOs.</h2>
            <div class="rules-list">${rules.dos.map(r => `
              <div class="rules-item"><div class="rules-icon">\u2713</div><p>${r}</p></div>`).join('')}
            </div>
          </div></div>
          <div class="rules-col rules-dont"><div class="rules-col-inner reveal">
            <h2>DON'Ts.</h2>
            <div class="rules-list">${rules.donts.map(r => `
              <div class="rules-item"><div class="rules-icon">\u2717</div><p>${r}</p></div>`).join('')}
            </div>
          </div></div>
        </div>`;
    }

    function renderExamples(examples) {
      const delays = ['', ' d1', ' d2'];
      document.getElementById('exSection').innerHTML = `
        <div class="label reveal">In Practice</div>
        <h2 class="heading reveal d1">Real <em>examples.</em></h2>
        <p class="subtext reveal d2">How SAs have been engaged across different deal scenarios.</p>
        <div class="ex-grid">${examples.map((e, i) => `
          <div class="ex-card reveal${delays[i] || ''}">
            <div class="ex-tags">${e.tags.map(t => `<span class="ex-tag">${t}</span>`).join('')}</div>
            <div class="ex-body"><h3>${e.title}</h3><p>${e.description}</p></div>
          </div>`).join('')}
        </div>`;
    }

    function renderResources(resources) {
      const delays = ['', ' d1', ' d2'];
      document.getElementById('resSection').innerHTML = `
        <div class="label reveal">Tools &amp; Assets</div>
        <h2 class="heading reveal d1">SA-curated <em>resources.</em></h2>
        <p class="subtext reveal d2">Resources built and maintained by the SA team for the broader sales org.</p>
        <div class="res-grid">${resources.map((r, i) => `
          <a href="${r.url}" target="_blank" class="res-card reveal${delays[i] || ''}">
            <div class="res-icon">${r.icon}</div>
            <h3>${r.title}</h3>
            <p>${r.description}</p>
            <span class="res-link">${r.linkText} \u2192</span>
          </a>`).join('')}
        </div>`;
    }

    function renderTeam(leadership, team) {
      const delays = ['', ' d1', ' d2', ' d3', ' d4', ' d4'];
      document.getElementById('teamSection').innerHTML = `
        <div class="label reveal">The Humans</div>
        <h2 class="heading reveal d1">Meet the <em>team.</em></h2>
        <p class="subtext reveal d2">Enterprise Solutions Architects spanning NORAM and EMEA, covering every major technical discipline.</p>

        <div class="team-region-label reveal">Leadership</div>
        <div class="lead-grid">${leadership.map((l, i) => `
          <div class="lead-card reveal${delays[i] || ''}">
            <img class="lead-photo" src="${l.photo}" alt="${l.name}">
            <div>
              <div class="lead-name">${l.name}</div>
              <div class="lead-title">${l.title}</div>
              <div class="lead-region">${l.location}</div>
              <span class="lead-badge">${l.badge}</span>
            </div>
          </div>`).join('')}
        </div>

        ${Object.entries(team).map(([region, members]) => `
          <div class="team-region-label reveal">${region.toUpperCase()}</div>
          <div class="team-grid">${members.map((m, i) => `
            <div class="team-card reveal${delays[i] || ''}">
              <img class="team-photo" src="${m.photo}" alt="${m.name}">
              <div>
                <div class="team-name">${m.name}</div>
                <div class="team-spec">${m.specialty}</div>
                <div class="team-tz">${m.location}</div>
              </div>
            </div>`).join('')}
          </div>`).join('')}`;
    }

    // ── Animations (initialized after render) ──
    function initAnimations() {
      // Scroll reveal
      const reveals = document.querySelectorAll('.reveal');
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
      reveals.forEach(el => obs.observe(el));

      // Count-up
      function animateCount(el) {
        const text = el.textContent.trim();
        const match = text.match(/^([^\d]*)(\d+)([^\d]*)$/);
        if (!match) return;
        const prefix = match[1], target = parseInt(match[2]), suffix = match[3];
        const duration = 1200, start = performance.now();
        el.textContent = prefix + '0' + suffix;
        function tick(now) {
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = prefix + Math.round(target * eased) + suffix;
          if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }
      const statNums = document.querySelectorAll('.stat-num');
      const statObs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting && !e.target.dataset.counted) {
            e.target.dataset.counted = 'true';
            animateCount(e.target);
          }
        });
      }, { threshold: 0.5 });
      statNums.forEach(el => statObs.observe(el));
    }

    // ── Mobile nav ──
    document.getElementById('navToggle').addEventListener('click', () =>
      document.getElementById('navLinks').classList.toggle('open'));
    document.getElementById('navLinks').querySelectorAll('a').forEach(a =>
      a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open')));
  </script>
</body>
</html>
